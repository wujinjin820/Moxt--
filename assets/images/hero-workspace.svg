  <circle cx="200" cy="82" r="10" fill="none" stroke="#2D2A26" stroke-width="2"/>
  <line x1="206" y1="88" x2="214" y2="96" stroke="#2D2A26" stroke-width="2" stroke-linecap="round"/>
  <text x="200" y="135" text-anchor="middle" font-size="11" font-family="Plus Jakarta Sans,system-ui,sans-serif" fill="#0D0E10" font-weight="600">Research</text>
  
